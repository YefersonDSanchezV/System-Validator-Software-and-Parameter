services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8020}:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8010}:80"
